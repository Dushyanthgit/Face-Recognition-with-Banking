
<!DOCTYPE html>
<html>
<head>
    <title>Register - Face Bank</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap");

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Open Sans", sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            color: #fff;
            background: #0a0e17;
            padding: 20px;
        }

        /* 🔹 Background with secure tech pattern */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at top, rgba(23, 58, 133, 0.4) 0%, transparent 70%),
                radial-gradient(ellipse at bottom, rgba(14, 165, 233, 0.25) 0%, transparent 70%);
            z-index: -2;
            opacity: 1 !important;
        }

        /* 🔹 Animated grid overlay for "tech" feel */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 20s linear infinite;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(40px); }
        }

        /* 🔹 Security Badge */
        .security-badge {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.4);
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #6ee7b7;
            backdrop-filter: blur(8px);
            animation: pulse 2s ease-in-out infinite;
            z-index: 100;
        }

        .lock-icon {
            font-size: 1.1rem;
        }

        /* 🔹 Face Scan Animation Line */
        .scanner-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #0ea5e9, transparent);
            box-shadow: 0 0 20px #0ea5e9, 0 0 40px #0ea5e9;
            animation: scan 3s ease-in-out infinite;
            z-index: 50;
            opacity: 0.9;
        }

        @keyframes scan {
            0%, 100% { top: -10%; opacity: 0; }
            10% { opacity: 0.9; }
            90% { opacity: 0.9; }
            100% { top: 110%; opacity: 0; }
        }

        /* 🔹 Main Heading */
        h2 {
            font-size: 2rem;
            font-weight: 700;
            margin: 60px 20px 20px;
            text-align: center;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 50%, #67e8f9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 4px 30px rgba(14, 165, 233, 0.3);
            position: relative;
            z-index: 2;
            letter-spacing: -0.5px;
        }

        h2::after {
            content: "";
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, #0ea5e9, #22d3ee);
            border-radius: 2px;
        }

        /* 🔹 Form Container */
        .form-container {
            width: 100%;
            max-width: 400px;
            padding: 25px 20px;
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 20px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
            z-index: 2;
            margin: 10px 20px 30px;
        }

        /* 🔹 Form Groups */
        .form-group {
            margin-bottom: 18px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #cbd5e1;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.4);
            background: rgba(15, 23, 42, 0.8);
            color: #fff;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: #0ea5e9;
            box-shadow: 
                0 0 0 3px rgba(14, 165, 233, 0.25),
                0 4px 20px rgba(14, 165, 233, 0.15);
            background: rgba(15, 23, 42, 0.95);
        }

        .form-group input::placeholder {
            color: rgba(148, 163, 184, 0.7);
        }

        /* 🔹 Camera Preview Placeholder */
        .camera-preview {
            width: 100%;
            height: 150px;
            background: rgba(15, 23, 42, 0.6);
            border: 2px dashed rgba(148, 163, 184, 0.5);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 10px 0 20px;
            color: rgba(148, 163, 184, 0.9);
            font-size: 0.85rem;
            position: relative;
            overflow: hidden;
        }

        .camera-preview::before {
            content: "📷";
            font-size: 2rem;
            margin-bottom: 5px;
            opacity: 0.7;
        }

        .camera-preview::after {
            content: "Camera will activate on submit";
            position: absolute;
            bottom: 8px;
            font-size: 0.75rem;
            color: rgba(148, 163, 184, 0.7);
        }

        /* 🔹 Submit Button */
        .btn-submit {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px 20px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.25), rgba(37, 99, 235, 0.15));
            color: #fff;
            box-shadow: 
                0 4px 20px rgba(59, 130, 246, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            cursor: pointer;
        }

        .btn-submit::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
            z-index: -1;
        }

        .btn-submit:hover::before {
            left: 100%;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 8px 30px rgba(59, 130, 246, 0.55),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            border-color: rgba(96, 165, 250, 0.6);
        }

        .btn-icon {
            font-size: 1.2rem;
            transition: transform 0.3s ease;
        }

        .btn-submit:hover .btn-icon {
            transform: scale(1.15);
        }

        /* 🔹 Back Link */
        .back-link {
            margin: 10px 0 25px;
            text-align: center;
            z-index: 2;
        }

        .back-link a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .back-link a:hover {
            color: #60a5fa;
        }

        .back-icon {
            transition: transform 0.3s ease;
        }

        .back-link a:hover .back-icon {
            transform: translateX(-3px);
        }

        /* 🔹 Security Footer */
        .security-footer {
            margin-bottom: 20px;
            padding: 10px 20px;
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.25);
            border-radius: 50px;
            font-size: 0.8rem;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
            z-index: 2;
        }

        .shield-icon {
            font-size: 1rem;
            color: #60a5fa;
        }

        /* 🔹 Floating Particles */
        .particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: rgba(14, 165, 233, 0.6);
            border-radius: 50%;
            animation: float 15s infinite linear;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-20vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* 🔹 Responsive */
        @media (max-width: 480px) {
            h2 {
                font-size: 1.7rem;
                margin: 50px 15px 15px;
            }
            
            .form-container {
                padding: 20px 15px;
                margin: 10px 15px 25px;
            }
            
            .btn-submit {
                padding: 12px 18px;
                font-size: 0.95rem;
            }
            
            .security-badge {
                top: 15px;
                right: 15px;
                font-size: 0.75rem;
                padding: 6px 12px;
            }
            
            .camera-preview {
                height: 120px;
            }
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
        }

        /* Custom Cursor */
        body {
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><path fill='%230ea5e9' d='M12 0L14.59 9.41L24 12L14.59 14.59L12 24L9.41 14.59L0 12L9.41 9.41L12 0Z'/></svg>") 12 12, auto;
        }

        /* Sparkle Animation */
        @keyframes sparkleAnim {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
        }

        .sparkle {
            position: fixed;
            pointer-events: none;
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, #fff, #0ea5e9, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            animation: sparkleAnim 0.6s ease-out forwards;
            z-index: 9999;
            box-shadow: 0 0 10px #0ea5e9, 0 0 20px rgba(14, 165, 233, 0.5);
        }

        button:hover::after {
            content: "✦";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0ea5e9;
            font-size: 20px;
            animation: sparkleAnim 0.5s ease-out;
            pointer-events: none;
            text-shadow: 0 0 10px #0ea5e9;
        }
    </style>
</head>
<body>
    <!-- Decorative secure elements -->
    <div class="security-badge">
        <span class="lock-icon">🔒</span> End-to-End Encrypted
    </div>
    
    <div class="scanner-line"></div>
    
    <h2>Create Your Account</h2>
    
    <div class="form-container">
        <form method="POST" action="/register">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input 
                    type="text" 
                    id="name" 
                    name="name" 
                    placeholder="Enter your full name" 
                    required
                    autocomplete="name"
                >
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="you@example.com" 
                    required
                    autocomplete="email"
                >
            </div>
            
            <div class="form-group">
                <label>Phone No</label>
                <input type="text" name="phone" placeholder="Phone Number" required>
            </div>
            
            <div class="camera-preview"></div>
            
            <button type="submit" class="btn-submit">
                <span class="btn-icon">📸</span> Register & Capture Face
            </button>
        </form>
    </div>
    
    <div class="back-link">
        <a href="/">
            <span class="back-icon">←</span> Back to Home
        </a>
    </div>
    
    <div class="security-footer">
        <span class="shield-icon">🛡️</span> Biometric Authentication • 256-bit SSL
    </div>
    
    <script>
        // 🔹 Add floating particles dynamically for secure-tech ambiance
        document.addEventListener('DOMContentLoaded', () => {
            const body = document.body;
            for (let i = 0; i < 12; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (12 + Math.random() * 10) + 's';
                body.appendChild(particle);
            }
            
            // 🔹 Optional: Add sparkle effect on form interactions
            const interactiveElements = document.querySelectorAll('input, button, a');
            interactiveElements.forEach(el => {
                el.addEventListener('mousemove', (e) => {
                    if (Math.random() > 0.7) {
                        createSparkle(e.pageX, e.pageY);
                    }
                });
            });
            
            function createSparkle(x, y) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = x + 'px';
                sparkle.style.top = y + 'px';
                document.body.appendChild(sparkle);
                
                setTimeout(() => sparkle.remove(), 600);
            }
        });
        
        // 🔹 Debug: Check if background image loads
        window.addEventListener('load', () => {
            const img = new Image();
            img.src = 'static/images/banklockimg.jpg';
            img.onload = () => console.log('✅ Background image loaded successfully!');
            img.onerror = () => console.error('❌ Background image NOT found at: static/images/banklockimg.jpg');
        });
    </script>
</body>
</html>
